name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build-ipa:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Optional: verify the active Xcode version
      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build archive (unsigned)
        run: |
          xcodebuild clean archive \
            -project esp_ble.xcodeproj \
            -scheme esp_ble \
            -configuration Release \
            -archivePath build/esp_ble.xcarchive \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Create IPA from archive
        run: |
          mkdir -p Payload
          cp -r build/esp_ble.xcarchive/Products/Applications/esp_ble.app Payload/
          zip -r esp_ble.ipa Payload

      - name: Upload IPA as artifact
        uses: actions/upload-artifact@v4
        with:
          name: esp_ble.ipa
          path: esp_ble.ipa
          retention-days: 7
